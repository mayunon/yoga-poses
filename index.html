<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヨガポーズ帖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:#faf9f7;color:#2c2c2a;min-height:100vh;}
.app{max-width:700px;margin:0 auto;padding:1.8rem 1.2rem;}
.app-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.4rem;}
.header-left h1{font-family:'Noto Serif JP',serif;font-weight:300;font-size:24px;color:#2c2c2a;letter-spacing:.08em;}
.app-sub{font-size:11px;color:#888780;margin-top:3px;}
.lang-btn{font-size:12px;padding:5px 12px;border:1px solid #d3d1c7;border-radius:20px;background:transparent;cursor:pointer;color:#888780;font-family:inherit;transition:all .15s;}
.lang-btn:hover{background:#f1efe8;color:#2c2c2a;}
.tab-bar{display:flex;border-bottom:1px solid #e0ddd6;margin-bottom:1.4rem;overflow-x:auto;}
.tab{font-family:inherit;font-size:13px;padding:9px 16px;border:none;background:none;color:#888780;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab.active{color:#2c2c2a;border-bottom:2px solid #2c2c2a;font-weight:500;}
.page{display:none;}.page.active{display:block;}
/* ポーズ図鑑 */
.search-bar{width:100%;padding:9px 13px;border:1px solid #d3d1c7;border-radius:8px;font-family:inherit;font-size:13px;background:#fff;color:#2c2c2a;margin-bottom:.9rem;outline:none;}
.search-bar:focus{border-color:#888780;}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.1rem;}
.fb{font-family:inherit;font-size:11px;padding:4px 12px;border:1px solid #d3d1c7;border-radius:20px;background:transparent;color:#888780;cursor:pointer;transition:all .15s;}
.fb.active,.fb:hover{background:#f1efe8;color:#2c2c2a;border-color:#888780;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:11px;}
.card{background:#fff;border:1px solid #e0ddd6;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .1s;}
.card:hover{border-color:#b4b2a9;transform:translateY(-1px);}
.card-body{padding:12px 13px;}
.card-name{font-size:12px;font-weight:500;color:#2c2c2a;margin-bottom:2px;}
.card-en{font-size:10px;color:#888780;margin-bottom:5px;}
.tags{display:flex;gap:3px;flex-wrap:wrap;}
.tag{font-size:10px;padding:2px 6px;border-radius:10px;}
.tl{background:#EAF3DE;color:#3B6D11;}.tc{background:#E1F5EE;color:#0F6E56;}
/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:14px;border:1px solid #d3d1c7;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
.modal-body{padding:1.4rem;}
.modal-name{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:400;color:#2c2c2a;margin-bottom:3px;}
.modal-en{font-size:12px;color:#888780;margin-bottom:10px;}
.modal-tags{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.msec{font-size:11px;color:#888780;margin-top:12px;margin-bottom:4px;}
.mdesc{font-size:13px;line-height:1.75;color:#2c2c2a;}
.close-btn{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:#888780;}
.close-btn:hover{color:#2c2c2a;}
/* ルーティン */
.routine-cards{display:flex;flex-direction:column;gap:10px;}
.rcard{background:#fff;border:1px solid #e0ddd6;border-radius:12px;padding:1.1rem 1.2rem;cursor:pointer;transition:border-color .15s;}
.rcard:hover{border-color:#b4b2a9;}
.rcard-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.rcard-title{font-size:14px;font-weight:500;color:#2c2c2a;}
.rcard-meta{font-size:11px;color:#888780;}
.rcard-desc{font-size:12px;color:#888780;margin-bottom:9px;line-height:1.6;}
.rcard-poses{display:flex;gap:4px;flex-wrap:wrap;}
.rpill{font-size:11px;padding:3px 8px;border-radius:10px;background:#f1efe8;color:#5f5e5a;}
.routine-detail{display:none;}
.routine-detail.open{display:block;}
.back-btn{font-family:inherit;font-size:12px;background:none;border:none;cursor:pointer;color:#888780;padding:0 0 1rem;display:flex;align-items:center;gap:4px;}
.back-btn:hover{color:#2c2c2a;}
.rdetail-title{font-family:'Noto Serif JP',serif;font-size:19px;font-weight:400;margin-bottom:4px;color:#2c2c2a;}
.rdetail-meta{font-size:12px;color:#888780;margin-bottom:1.2rem;}
.step-list{display:flex;flex-direction:column;gap:8px;}
.step{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e0ddd6;border-radius:8px;padding:9px 11px;}
.step-num{width:22px;height:22px;border-radius:50%;background:#f1efe8;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;color:#888780;flex-shrink:0;}
.step-info{flex:1;}
.step-name{font-size:13px;font-weight:500;color:#2c2c2a;}
.step-dur{font-size:11px;color:#888780;margin-top:2px;}
/* タイマー */
.timer-box{margin-top:1rem;background:#f1efe8;border-radius:10px;padding:1.1rem 1.2rem;text-align:center;}
.timer-step-label{font-size:11px;color:#888780;margin-bottom:4px;letter-spacing:.04em;}
.timer-pose-name{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:400;color:#2c2c2a;margin-bottom:6px;}
.timer-time{font-family:'Noto Serif JP',serif;font-size:40px;color:#2c2c2a;letter-spacing:.05em;line-height:1;}
.timer-progress-wrap{width:100%;background:#e0ddd6;border-radius:4px;height:4px;margin:10px 0 8px;overflow:hidden;}
.timer-progress-bar{height:4px;background:#2c2c2a;border-radius:4px;transition:width .9s linear;}
.timer-next{font-size:12px;color:#888780;min-height:18px;margin-bottom:4px;}
.timer-controls{display:flex;gap:8px;justify-content:center;margin-top:10px;}
.tc-btn{font-family:inherit;font-size:12px;padding:6px 16px;border:1px solid #d3d1c7;border-radius:8px;background:#fff;cursor:pointer;color:#2c2c2a;}
.tc-btn:hover{background:#e0ddd6;}
.tc-btn.tc-start{background:#2c2c2a;color:#faf9f7;border-color:#2c2c2a;padding:6px 22px;}
.tc-btn.tc-start:hover{background:#444441;}
.timer-audio-row{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
.audio-toggle-btn{font-family:inherit;font-size:11px;padding:5px 12px;border:1px solid #d3d1c7;border-radius:20px;background:#fff;cursor:pointer;color:#888780;transition:all .15s;}
.audio-toggle-btn.on{background:#2c2c2a;color:#fff;border-color:#2c2c2a;}
/* 呼吸法 */
.breath-cards{display:flex;flex-direction:column;gap:12px;}
.breath-card{background:#fff;border:1px solid #e0ddd6;border-radius:12px;padding:1.2rem 1.3rem;}
.breath-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.breath-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:400;color:#2c2c2a;}
.breath-tag{font-size:10px;padding:3px 9px;border-radius:10px;background:#E1F5EE;color:#0F6E56;}
.breath-desc{font-size:13px;color:#5f5e5a;line-height:1.75;margin-bottom:10px;}
.breath-steps{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.breath-step{font-size:12px;color:#2c2c2a;line-height:1.6;padding:6px 10px;background:#faf9f7;border-radius:6px;border-left:2px solid #d3d1c7;}
.breath-step strong{color:#0F6E56;}
.breath-btn{font-family:inherit;font-size:12px;padding:7px 18px;border:1px solid #d3d1c7;border-radius:8px;background:transparent;cursor:pointer;color:#2c2c2a;transition:background .15s;}
.breath-btn:hover{background:#f1efe8;}
.breath-timer{margin-top:10px;background:#f1efe8;border-radius:8px;padding:.8rem 1rem;text-align:center;display:none;}
.breath-timer.open{display:block;}
.breath-phase{font-size:13px;color:#888780;margin-bottom:4px;}
.breath-count{font-family:'Noto Serif JP',serif;font-size:36px;color:#2c2c2a;letter-spacing:.05em;}
.breath-cycle{font-size:11px;color:#888780;margin-top:4px;}
.breath-ctrl{display:flex;gap:8px;justify-content:center;margin-top:8px;}
.breath-stop-btn{font-family:inherit;font-size:12px;padding:5px 16px;border:1px solid #d3d1c7;border-radius:8px;background:#fff;cursor:pointer;color:#888780;}
@media(max-width:480px){.app{padding:1.2rem .8rem;}.grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}.tab{font-size:12px;padding:8px 10px;}}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="header-left">
      <h1 id="app-title">ヨガポーズ帖</h1>
      <p class="app-sub">yoga pose &amp; breathing</p>
    </div>
    <button class="lang-btn" onclick="toggleLang()" id="lang-btn">EN</button>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('poses')" id="tab-poses">ポーズ図鑑</button>
    <button class="tab" onclick="switchTab('routine')" id="tab-routine">ルーティン</button>
    <button class="tab" onclick="switchTab('breath')" id="tab-breath">呼吸法</button>
  </div>

  <!-- ポーズ図鑑 -->
  <div class="page active" id="page-poses">
    <input class="search-bar" id="search" oninput="renderPoses()" placeholder="ポーズ名で検索...">
    <div class="filters" id="filters"></div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- ルーティン -->
  <div class="page" id="page-routine">
    <div id="routine-list"><div class="routine-cards" id="rcards"></div></div>
    <div class="routine-detail" id="routine-detail">
      <button class="back-btn" onclick="closeRoutine()" id="back-btn">← ルーティン一覧へ</button>
      <p class="rdetail-title" id="rd-title"></p>
      <p class="rdetail-meta" id="rd-meta"></p>
      <div class="step-list" id="step-list"></div>
      <div class="timer-box" id="timer-box">
        <p class="timer-step-label" id="timer-label">現在のポーズ</p>
        <p class="timer-pose-name" id="timer-pose">—</p>
        <p class="timer-time" id="timer-time">0:00</p>
        <div class="timer-progress-wrap"><div class="timer-progress-bar" id="timer-progress" style="width:0%"></div></div>
        <p class="timer-next" id="timer-next"></p>
        <div class="timer-controls">
          <button class="tc-btn" onclick="prevPose()" id="btn-prev">← 前へ</button>
          <button class="tc-btn tc-start" onclick="toggleStart()" id="start-btn">▷ 開始</button>
          <button class="tc-btn" onclick="nextPose()" id="btn-next">次へ →</button>
        </div>
        <div class="timer-audio-row">
          <button class="audio-toggle-btn" onclick="toggleBgm()" id="bgm-btn">BGM オン</button>
          <select id="bgm-type" onchange="changeBgmType()" style="font-family:inherit;font-size:11px;padding:4px 8px;border:1px solid #d3d1c7;border-radius:8px;background:#fff;color:#2c2c2a;cursor:pointer;">
            <option value="bowl">シンギングボール</option>
            <option value="musicbox">オルゴール</option>
            <option value="wave">波の音</option>
            <option value="mantra">マントラ（オーム）</option>
          </select>
          <input type="range" min="0" max="100" value="40" id="bgm-vol" oninput="setBgmVol(this.value)" style="width:55px;">
        </div>
        <div class="timer-audio-row" style="margin-top:6px;">
          <button class="audio-toggle-btn" onclick="toggleVoice()" id="voice-btn">声 オン</button>
          <input type="range" min="0" max="100" value="92" id="voice-vol" oninput="setVoiceVol(this.value)" style="width:55px;">
        </div>
      </div>
    </div>
  </div>

  <!-- 呼吸法 -->
  <div class="page" id="page-breath">
    <div class="timer-audio-row" style="margin-bottom:1rem;justify-content:flex-start;">
      <button class="audio-toggle-btn" onclick="toggleBgmBreath()" id="bgm-btn-breath">BGM オン</button>
      <select id="bgm-type-breath" onchange="changeBgmTypeBreath()" style="font-family:inherit;font-size:11px;padding:4px 8px;border:1px solid #d3d1c7;border-radius:8px;background:#fff;color:#2c2c2a;cursor:pointer;">
        <option value="bowl">シンギングボール</option>
        <option value="musicbox">オルゴール</option>
        <option value="wave">波の音</option>
        <option value="mantra">マントラ（オーム）</option>
      </select>
      <input type="range" min="0" max="100" value="40" id="bgm-vol-breath" oninput="setBgmVolBreath(this.value)" style="width:55px;">
      <button class="audio-toggle-btn" onclick="toggleVoice()" id="voice-btn-breath">声 オン</button>
    </div>
    <div class="breath-cards" id="breath-cards"></div>
  </div>
</div>

<!-- ポーズ詳細モーダル -->
<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-body">
      <button class="close-btn" onclick="document.getElementById('modal').classList.remove('open')">×</button>
      <p class="modal-name" id="modal-name"></p>
      <p class="modal-en" id="modal-en"></p>
      <div class="modal-tags" id="modal-tags"></div>
      <p class="msec" id="msec-effect">効果・説明</p>
      <p class="mdesc" id="modal-desc"></p>
      <p class="msec" id="msec-parts">対象部位</p>
      <p class="mdesc" id="modal-parts"></p>
    </div>
  </div>
</div>

<script>

  {id:21,name:"仰向けのねじり",en:"Supta Matsyendrasana",cat:"仰向け",level:"初級",parts:"脊椎・腰・お腹",desc:"仰向けで膝を倒してねじるポーズ。腰痛緩和・消化促進・脊椎のリセットに効果的。"},
  {id:22,name:"脚を壁に上げるポーズ",en:"Viparita Karani",cat:"仰向け",level:"初級",parts:"脚・腰・血流",desc:"脚を壁に沿って上げる逆転ポーズ。血流促進・疲労回復・むくみ解消に。"},
  {id:23,name:"鳩のポーズ",en:"Eka Pada Rajakapotasana",cat:"前屈",level:"中級",parts:"股関節・腸腰筋・臀部",desc:"前足を曲げて股関節を深く開くポーズ。腸腰筋と臀部の深いストレッチ。坐骨神経痛にも。"},

// ルーティンデータ（左右を別ステップに分割）
const RT=[
  {id:1,

        </div>

function playBreathTick(){
  const ctx=getActx();
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine';o.frequency.value=660;
  g.gain.setValueAtTime(0.18,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.07);
  o.connect(g);g.connect(ctx.destination);
  o.start();o.stop(ctx.currentTime+0.09);
}

function startBreath(id){
  stopBreath(id);
  const b=BR.find(x=>x.id===id);
  const box=document.getElementById(`breath-timer-${id}`);
  box.classList.add('open');
  if(!bgmGain){
    const type=document.getElementById('bgm-type-breath').value;
    document.getElementById('bgm-type').value=type;
    startBgm();
  }
  let phaseIdx=0,count=b.pattern[0],cycle=1;
  const totalCycles=b.id===3?3:b.id===2?8:10;
  const voiceCycles=3; // 最初の3サイクルだけ音声案内

  function tick(){
    const phaseLabel=b.phases[lang][phaseIdx];
    document.getElementById(`breath-phase-${id}`).textContent=phaseLabel;
    document.getElementById(`breath-count-${id}`).textContent=count>0?count:'';
    document.getElementById(`breath-cycle-${id}`).textContent=lang==='ja'?`${cycle}回目 / ${totalCycles}回`:`Round ${cycle} / ${totalCycles}`;

    // カウント音（毎秒）
    playBreathTick();

    // カパラバティは毎回読み上げしない（音だけ）
    if(b.id===3&&phaseIdx===0&&cycle<=voiceCycles){
      speak(lang==='ja'?'はきましょう':'exhale');
    }

    if(count>1){
      count--;
    } else {
      phaseIdx=(phaseIdx+1)%b.pattern.length;
      if(phaseIdx===0)cycle++;
      if(cycle>totalCycles){
        stopBreath(id);
        document.getElementById(`breath-phase-${id}`).textContent=lang==='ja'?'完了。お疲れ様でした。':'Complete. Well done.';
        document.getElementById(`breath-count-${id}`).textContent='';
        speak(lang==='ja'?'完了です。お疲れ様でした。':'Complete. Well done.');
        return;
      }
      count=b.pattern[phaseIdx]||1;
      // フェーズ変わりの音声は3サイクルまで
      if(cycle<=voiceCycles){
        const nl=b.phases[lang][phaseIdx];
        if(nl&&b.id!==3)setTimeout(()=>speak(nl),100);
      }
    }
  }

  // 最初のフェーズ読み上げ（1サイクル目なので必ず）
  if(b.id!==3)speak(b.phases[lang][0]);
  else speak(lang==='ja'?'はきましょう':'exhale');
  tick();
  breathTimers[id]=setInterval(tick,1000);
}
function stopBreath(id){
  if(breathTimers[id]){clearInterval(breathTimers[id]);delete breathTimers[id];}
  const box=document.getElementById(`breath-timer-${id}`);
  if(box)box.classList.remove('open');
  // 他の呼吸タイマーが全部停止していたらBGMも止める
  if(Object.keys(breathTimers).length===0)stopBgm();
}

// 呼吸法ページ用BGMコントロール（ルーティンのものと同期）
function toggleBgmBreath(){
  bgmOn=!bgmOn;
  const btn=document.getElementById('bgm-btn-breath');
  btn.className='audio-toggle-btn'+(bgmOn?' on':'');
  btn.textContent='BGM '+(bgmOn?'オン':'オフ');
  // ルーティン側のボタンも同期
  const rb=document.getElementById('bgm-btn');
  if(rb){rb.className=btn.className;rb.textContent=btn.textContent;}
  if(bgmGain){const vol=parseInt(document.getElementById('bgm-vol-breath').value)/100*0.5;bgmGain.gain.setTargetAtTime(bgmOn?vol:0,getActx().currentTime,0.5);}
}
function changeBgmTypeBreath(){
  const type=document.getElementById('bgm-type-breath').value;
  document.getElementById('bgm-type').value=type;
  if(bgmGain){stopBgm();setTimeout(()=>startBgm(),100);}
}

  setBgmVol(v);
}

// ===== Audio =====
let actx=null,bgmNode=null,bgmGain=null,bgmOn=true,voiceOn=true,voiceVolume=0.92;
function getActx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function toggleBgm(){
  bgmOn=!bgmOn;
  document.getElementById('bgm-btn').className='audio-toggle-btn'+(bgmOn?' on':'');
  document.getElementById('bgm-btn').textContent='BGM '+(bgmOn?'オン':'オフ');
  if(bgmGain){const vol=parseInt(document.getElementById('bgm-vol').value)/100*0.5;bgmGain.gain.setTargetAtTime(bgmOn?vol:0,getActx().currentTime,0.5);}
}
function toggleVoice(){
  voiceOn=!voiceOn;
  ['voice-btn','voice-btn-breath'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.className='audio-toggle-btn'+(voiceOn?' on':'');el.textContent='声 '+(voiceOn?'オン':'オフ');}
  });
}
function setBgmVol(v){if(bgmGain&&bgmOn)bgmGain.gain.setTargetAtTime(parseInt(v)/100*0.5,getActx().currentTime,0.1);}
function setVoiceVol(v){voiceVolume=parseInt(v)/100;}
function changeBgmType(){if(bgmGain){stopBgm();setTimeout(()=>startBgm(),100);}}

function startBgm(){
  const ctx=getActx();
  if(bgmNode){try{bgmNode.disconnect();}catch(e){}}
  bgmGain=ctx.createGain();bgmGain.gain.value=0;bgmGain.connect(ctx.destination);
  const type=document.getElementById('bgm-type').value;
  if(type==='bowl')startBowl(ctx);
  else if(type==='musicbox')startMusicBox(ctx);
  else if(type==='wave')startWave(ctx);
  else if(type==='mantra')startMantra(ctx);
  const vol=parseInt(document.getElementById('bgm-vol').value)/100*0.5;
  bgmGain.gain.setTargetAtTime(bgmOn?vol:0,ctx.currentTime,1.0);
}
function stopBgm(){if(actx){try{actx.close();}catch(e){}actx=null;bgmNode=null;bgmGain=null;}}

function startBowl(ctx){
  function play(freq,time){
    [1,2.756,5.404,8.933,13.34].forEach((r,i)=>{
      const osc=ctx.createOscillator(),g=ctx.createGain();
      osc.type='sine';osc.frequency.value=freq*r;
      g.gain.setValueAtTime(0,time);g.gain.linearRampToValueAtTime([1,.35,.18,.08,.04][i]*.22,time+.04);
      g.gain.exponentialRampToValueAtTime(.0001,time+[8,5,3.5,2.5,2][i]);
      osc.connect(g);g.connect(bgmGain);osc.start(time);osc.stop(time+[8,5,3.5,2.5,2][i]+.1);
    });
    const c=ctx.createOscillator(),cg=ctx.createGain();
    c.type='sine';c.frequency.value=freq*.5;cg.gain.setValueAtTime(.15,time);cg.gain.exponentialRampToValueAtTime(.001,time+.12);
    c.connect(cg);cg.connect(bgmGain);c.start(time);c.stop(time+.15);
  }
  const bowls=[216,288,324,432];
  function loop(t){if(!bgmGain)return;[[bowls[0],0],[bowls[2],9],[bowls[1],18],[bowls[3],26],[bowls[0],36],[bowls[2],44]].forEach(([f,o])=>play(f,t+o));setTimeout(()=>{if(bgmGain)loop(ctx.currentTime+.1);},51000);}
  loop(ctx.currentTime+.2);bgmNode={disconnect:()=>{}};
}
function startMusicBox(ctx){
  function note(f,t,d){
    const o=ctx.createOscillator(),o2=ctx.createOscillator(),g=ctx.createGain(),g2=ctx.createGain();
    o.type='sine';o.frequency.value=f;o2.type='sine';o2.frequency.value=f*4.03;g2.gain.value=.08;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.18,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+d);
    o.connect(g);o2.connect(g2);g2.connect(g);g.connect(bgmGain);o.start(t);o.stop(t+d+.05);o2.start(t);o2.stop(t+d+.05);
  }
  const mel=[[523,1.2],[659,1.2],[784,1.6],[659,1.2],[523,1.6],[587,1.2],[784,1.2],[880,1.6],[784,1.2],[659,1.6],[523,1.2],[659,1.2],[523,1.2],[440,1.6],[392,2.0],[523,1.2],[659,1.2],[784,1.2],[880,1.2],[784,2.4]];
  const bas=[[262,3.2],[294,3.2],[262,3.2],[196,3.2],[262,3.2],[294,3.2],[262,3.2],[196,3.2]];
  let dur=0;mel.forEach(([f,d])=>dur+=d);
  function loop(t){if(!bgmGain)return;let s=t;mel.forEach(([f,d])=>{note(f,s,d*.85);s+=d;});s=t;bas.forEach(([f,d])=>{note(f,s,d*.7);s+=d;});setTimeout(()=>{if(bgmGain)loop(ctx.currentTime+.05);},(dur-.5)*1000);}
  loop(ctx.currentTime+.3);bgmNode={disconnect:()=>{}};
}
function startWave(ctx){
  const buf=ctx.createBuffer(1,ctx.sampleRate*4,ctx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<buf.length;i++)d[i]=Math.random()*2-1;
  const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
  const lpf=ctx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=400;lpf.Q.value=1.2;
  const lfo=ctx.createOscillator(),lg=ctx.createGain(),wg=ctx.createGain();
  lfo.type='sine';lfo.frequency.value=.12;lg.gain.value=.35;lfo.connect(lg);wg.gain.value=.45;lg.connect(wg.gain);
  src.connect(lpf);lpf.connect(wg);wg.connect(bgmGain);
  const lpf2=ctx.createBiquadFilter(),dg=ctx.createGain(),src2=ctx.createBufferSource();
  lpf2.type='lowpass';lpf2.frequency.value=80;dg.gain.value=.3;src2.buffer=buf;src2.loop=true;src2.loopStart=.7;
  src2.connect(lpf2);lpf2.connect(dg);dg.connect(bgmGain);
  lfo.start();src.start();src2.start();bgmNode=src;
}
function startMantra(ctx){
  function om(t){
    if(!bgmGain)return;
    const f=108,dur=12;
    [1,2,3,4,5,6].forEach((n,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=f*n;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime([.22,.14,.09,.06,.04,.02][i],t+1.5);
      g.gain.setValueAtTime([.22,.14,.09,.06,.04,.02][i],t+4);
      g.gain.linearRampToValueAtTime([.18,.08,.03,.01,.005,.001][i],t+7);
      g.gain.linearRampToValueAtTime(i<2?[.12,.06][i]:.0001,t+9);
      g.gain.exponentialRampToValueAtTime(.0001,t+dur);
      const lfo=ctx.createOscillator(),lg=ctx.createGain();
      lfo.type='sine';lfo.frequency.value=5.5+i*.3;lg.gain.value=f*n*.004;
      lfo.connect(lg);lg.connect(o.frequency);lfo.start(t);lfo.stop(t+dur);
      o.connect(g);g.connect(bgmGain);o.start(t);o.stop(t+dur+.1);
    });
    setTimeout(()=>{if(bgmGain)om(ctx.currentTime+.1);},(dur+3-.5)*1000);
  }
  om(ctx.currentTime+.5);bgmNode={disconnect:()=>{}};
}

function playTick(){
  const ctx=getActx(),o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.08);
  o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+.1);
}
function playDone(){
  const ctx=getActx();
  [523,659,784].forEach((f,i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.frequency.value=f;const t=ctx.currentTime+i*.18;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.25,t+.05);g.gain.exponentialRampToValueAtTime(.001,t+.4);
    o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+.5);
  });
}
function toReadable(t){return t.replace(/Ⅲ|III/g,'さん').replace(/Ⅱ|II/g,'に').replace(/Ⅰ|I(?=[^a-zA-Z]|$)/g,'いち');}
function speak(text){
  text=toReadable(text);
  if(!voiceOn||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang==='en'?'en-US':'ja-JP';u.rate=.78;u.pitch=.85;u.volume=voiceVolume;
  const vs=window.speechSynthesis.getVoices();
  const pv=vs.find(v=>v.lang==='ja-JP'&&/kyoko|haruka|otoya|google|female/i.test(v.name))||vs.find(v=>v.lang==='ja-JP'&&v.localService)||vs.find(v=>v.lang==='ja-JP');
  if(lang==='en'){const ev=vs.find(v=>v.lang==='en-US'&&/samantha|karen|moira|victoria|google/i.test(v.name))||vs.find(v=>v.lang==='en-US');if(ev)u.voice=ev;}
  else{if(pv)u.voice=pv;}
  window.speechSynthesis.speak(u);
}

// ===== タイマー =====
let stepDurSec=60,announcedCountdown=false,announcedNext=false,announcedPose=false,wakeLock=null;

async function requestWakeLock(){
  if(!('wakeLock' in navigator))return;
  try{
    wakeLock=await navigator.wakeLock.request('screen');
    document.addEventListener('visibilitychange',async()=>{if(wakeLock&&document.visibilityState==='visible'&&tr)try{wakeLock=await navigator.wakeLock.request('screen');}catch(e){}});
  }catch(e){}
}
function releaseWakeLock(){if(wakeLock){wakeLock.release().catch(()=>{});wakeLock=null;}}

function parseDurSec(s){
  let t=0;
  const mJ=s.match(/(\d+)分/),sJ=s.match(/(\d+)秒/),mE=s.match(/(\d+)\s*m(?!i)/i),sE=s.match(/(\d+)\s*s/i),mnE=s.match(/(\d+)\s*min/i);
  if(mJ)t+=parseInt(mJ[1])*60;if(sJ)t+=parseInt(sJ[1]);
  if(!mJ&&!sJ){if(mE&&!mnE)t+=parseInt(mE[1])*60;if(mnE)t+=parseInt(mnE[1])*60;if(sE)t+=parseInt(sE[1]);}
  return t||60;
}

function toggleStart(){
  if(!tr&&ts===0){startTimer();}
  else if(tr){
    tr=false;document.getElementById('start-btn').textContent=lang==='ja'?'▷ 再開':'▷ Resume';
    if(bgmGain)bgmGain.gain.setTargetAtTime(.04,getActx().currentTime,.3);
  } else {
    tr=true;document.getElementById('start-btn').textContent=lang==='ja'?'⏸ 一時停止':'⏸ Pause';
    if(bgmGain){const vol=parseInt(document.getElementById('bgm-vol').value)/100*.5;bgmGain.gain.setTargetAtTime(bgmOn?vol:0,getActx().currentTime,.3);}
  }
}

function startTimer(){
  document.getElementById('start-btn').textContent=lang==='ja'?'⏸ 一時停止':'⏸ Pause';
  document.getElementById('bgm-btn').className='audio-toggle-btn'+(bgmOn?' on':'');
  document.getElementById('bgm-btn').textContent='BGM '+(bgmOn?'オン':'オフ');
  document.getElementById('voice-btn').className='audio-toggle-btn'+(voiceOn?' on':'');
  document.getElementById('voice-btn').textContent='声 '+(voiceOn?'オン':'オフ');
  tsi=0;ts=0;tr=true;
  stepDurSec=parseDurSec(cr.steps[0].d[lang]);
  announcedPose=true;announcedCountdown=false;announcedNext=false;
  startBgm();requestWakeLock();updT();clearInterval(ti);
  setTimeout(()=>{const fp=poses.find(x=>x.id===cr.steps[0].pid);const fs=cr.steps[0];speak((fp?(lang==='en'?fp.en:fp.name):'')+(fs.side?'　'+fs.side:''));},600);
  ti=setInterval(()=>{
    if(!tr)return;ts++;
    const rem=stepDurSec-ts;
    if(rem<=10&&rem>0&&!announcedCountdown){
      announcedCountdown=true;
      const ns=cr.steps[tsi+1],np=ns?poses.find(x=>x.id===ns.pid):null;
      if(np)speak((lang==='en'?'Next: '+np.en:'次は、'+np.name)+(ns.side?'　'+ns.side:''));
    }
    if(rem<=10&&rem>0)playTick();
    if(ts>=stepDurSec){
      if(tsi<cr.steps.length-1){
        tsi++;ts=0;stepDurSec=parseDurSec(cr.steps[tsi].d[lang]);
        announcedPose=false;announcedCountdown=false;announcedNext=false;
      } else {
        tr=false;clearInterval(ti);playDone();
        speak(lang==='ja'?'ルーティン完了です。お疲れ様でした。':'Routine complete. Well done.');
        document.getElementById('timer-pose').textContent=lang==='ja'?'完了！':'Complete!';
        document.getElementById('timer-next').textContent='';
        document.getElementById('timer-progress').style.width='100%';
        document.getElementById('start-btn').textContent=lang==='ja'?'▷ もう一度':'▷ Again';
        ts=0;return;
      }
    }
    updT();
  },1000);
}

function updT(){
  const s=cr.steps[tsi],p=s?poses.find(x=>x.id===s.pid):null;
  const name=(p?(lang==='en'?p.en:p.name):'')+(s&&s.side?'（'+s.side+'）':'');
  const rem=stepDurSec-ts,m=Math.floor(rem/60),sc=rem%60;
  document.getElementById('timer-time').textContent=m+':'+(sc<10?'0':'')+sc;
  document.getElementById('timer-pose').textContent=name;
  document.getElementById('timer-progress').style.width=Math.min(100,Math.round(ts/stepDurSec*100))+'%';
  const ns=cr.steps[tsi+1],np=ns?poses.find(x=>x.id===ns.pid):null;
  document.getElementById('timer-next').textContent=np?((lang==='en'?'Next: '+np.en:'次　'+np.name)+(ns.side?'（'+ns.side+'）':'')):'';
  if(!announcedPose&&ts===0){announcedPose=true;setTimeout(()=>speak(name),300);}
}

function clearT(){
  clearInterval(ti);tr=false;ts=0;tsi=0;
  stopBgm();releaseWakeLock();
  window.speechSynthesis&&window.speechSynthesis.cancel();
}
function nextPose(){if(!cr)return;if(tsi<cr.steps.length-1){tsi++;ts=0;stepDurSec=parseDurSec(cr.steps[tsi].d[lang]);announcedPose=false;announcedCountdown=false;announcedNext=false;updT();}}
function prevPose(){if(!cr)return;if(tsi>0){tsi--;ts=0;stepDurSec=parseDurSec(cr.steps[tsi].d[lang]);announcedPose=false;announcedCountdown=false;announcedNext=false;updT();}}

load();applyI18n();initF();renderPoses();
</script>
